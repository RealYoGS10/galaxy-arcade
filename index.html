<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXY HUB | UNIT-01</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            background-color: #0c001c;
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 80px;
            background-color: #12002e;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            border-right: 1px solid #bc13fe;
        }

        .side-btn {
            width: 50px;
            height: 50px;
            margin-bottom: 25px;
            background: #1a003d;
            border: 1px solid #bc13fe;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: 0.3s;
        }

        .side-btn:hover { background: #bc13fe; box-shadow: 0 0 15px #bc13fe; }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 100px;
        }

        header {
            padding: 20px;
            background: #12002e;
            border-bottom: 2px solid #bc13fe;
            text-align: center;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
            padding: 40px;
        }

        .card {
            background: #1a003d;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: #ff00ff;
            box-shadow: 0 0 25px #ff00ff;
        }

        .card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: #220044; /* Backup color if image fails */
        }

        .card-name {
            padding: 15px;
            text-align: center;
            font-weight: bold;
        }

        /* THEATER */
        #theater {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            flex-direction: column;
        }

        .t-header {
            padding: 15px;
            background: #12002e;
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid #bc13fe;
        }

        iframe { flex: 1; width: 100%; border: none; }

        .btn {
            background: #bc13fe;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: 'Orbitron';
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="side-btn">🏠</div>
        <div class="side-btn">🔥</div>
        <div class="side-btn">🏎️</div>
    </div>

    <div class="main-content">
        <header>
            <h1>GALAXY_HUB // UNIT-01</h1>
        </header>

        <div id="theater">
            <div class="t-header">
                <button class="btn" onclick="closeGame()">⬅ HUB</button>
                <h2 id="game-title">MISSION</h2>
                <button class="btn" onclick="goFull()">⛶ FULLSCREEN</button>
            </div>
            <iframe id="game-frame"></iframe>
        </div>

        <div class="grid" id="main-grid"></div>
    </div>

    <script>
        // Use verified URLs from stable servers
        const games = [
            { n: "Bloxd.io", u: "https://bloxd.io/", i: "https://api.poki.com/poki-poki/v2/image/625/625/1657876116.png" },
            { n: "Veck.io", u: "https://veck.io/", i: "https://img.gamedistribution.com/83273640700c439185794c1f6d7247d8-512x512.jpeg" },
            { n: "Space Waves", u: "https://spacewaves.io/", i: "https://img.gamedistribution.com/5f7623971e4d41389886470081d6683a-512x512.jpeg" },
            { n: "Traffic Rider", u: "https://traffic-rider.io/", i: "https://img.gamedistribution.com/d687258380484501869e5d41571253d1-512x512.jpeg" },
            { n: "Rocket Goal", u: "https://rocketgoal.io/", i: "https://img.gamedistribution.com/264287570481498696ec0667e45e758e-512x512.jpeg" }
        ];

        const grid = document.getElementById('main-grid');
        for(let i=0; i<30; i++) {
            let g = games[i % games.length];
            grid.innerHTML += `
                <div class="card" onclick="play('${g.u}', '${g.n}')">
                    <img src="${g.i}" onerror="this.src='https://via.placeholder.com/300x160/220044/ffffff?text=MISSION'">
                    <div class="card-name">${g.n}</div>
                </div>`;
        }

        function play(u, n) {
            document.getElementById('game-frame').src = u;
            document.getElementById('theater').style.display = 'flex';
            document.getElementById('game-title').innerText = n;
        }

        function closeGame() {
            document.getElementById('theater').style.display = 'none';
            document.getElementById('game-frame').src = "";
        }

        function goFull() {
            let f = document.getElementById('game-frame');
            if (f.requestFullscreen) f.requestFullscreen();
        }
    </script>
</body>
</html>
