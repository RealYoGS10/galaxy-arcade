<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXY HUB | STABLE V1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { background: #0b001a; color: #d880ff; font-family: 'Orbitron', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* BACKGROUND */
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000 url(https://www.script-tutorials.com/demos/360/images/stars.png) repeat; z-index: -1; }

        /* GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 30px; }
        .card { background: rgba(30, 0, 60, 0.8); border: 2px solid #bc13fe; border-radius: 10px; cursor: pointer; transition: 0.3s; text-align: center; overflow: hidden; }
        .card:hover { transform: scale(1.05); box-shadow: 0 0 20px #ff00ff; }
        .card img { width: 100%; height: 140px; object-fit: cover; }
        
        /* THEATER MODE (Crazy Games Style) */
        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; }
        .t-header { padding: 10px; background: #1a0033; display: flex; justify-content: space-between; border-bottom: 2px solid #bc13fe; }
        iframe { flex-grow: 1; width: 100%; border: none; background: #000; }

        /* MUSIC BAR */
        .music-bar { position: fixed; bottom: 0; width: 100%; background: #110022; border-top: 2px solid #bc13fe; padding: 10px; display: flex; justify-content: center; gap: 15px; }
        button { background: #bc13fe; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; }
    </style>
</head>
<body>
    <div class="stars"></div>
    <h1 style="text-align:center; margin-top:20px; text-shadow: 0 0 10px #bc13fe;">GALAXY ARCADE</h1>

    <div class="grid" id="g"></div>

    <div id="theater">
        <div class="t-header">
            <button onclick="closeG()">⬅ BACK</button>
            <h3 id="t-title">LOADING...</h3>
            <button onclick="full()">⛶ FULLSCREEN</button>
        </div>
        <iframe id="f" allow="autoplay; fullscreen; keyboard"></iframe>
    </div>

    <div class="music-bar">
        <button onclick="m.play()">▶ PLAY MUSIC</button>
        <button onclick="m.pause()">⏸ PAUSE</button>
    </div>

    <script>
        // These are the most stable links that won't trigger "Refused to Connect"
        const games = [
            { n: "Drift Boss", u: "https://www.bing.com/games/embed/drift-boss/", i: "https://img.gamedistribution.com/7106ed807d89408696ec0667e45e758e-512x512.jpeg" },
            { n: "Neon Biker", u: "https://v6p9d9t4.ssl.hwcdn.net/html/1453254/index.html", i: "https://img.gamedistribution.com/d687258380484501869e5d41571253d1-512x512.jpeg" },
            { n: "Tower Twist", u: "https://games.gamezop.com/g/H1Zl1kr7mX", i: "https://static.gamezop.com/H1Zl1kr7mX/thumb.png" },
            { n: "Cyber Racer", u: "https://games.gamezop.com/g/SkhljT2fdgb", i: "https://static.gamezop.com/SkhljT2fdgb/thumb.png" },
            { n: "Knife Flip", u: "https://games.gamezop.com/g/rJ98eS6mX", i: "https://static.gamezop.com/rJ98eS6mX/thumb.png" },
            { n: "City Dunk", u: "https://games.gamezop.com/g/B1M4eH67mX", i: "https://static.gamezop.com/B1M4eH67mX/thumb.png" }
        ];

        const g = document.getElementById('g');
        for(let i=0; i<30; i++) {
            let item = games[i % games.length];
            g.innerHTML += `<div class="card" onclick="play('${item.u}', '${item.n}')">
                <img src="${item.i}">
                <div style="padding:10px">${item.n}</div>
            </div>`;
        }

        function play(u, n) {
            document.getElementById('f').src = u;
            document.getElementById('theater').style.display = 'flex';
            document.getElementById('t-title').innerText = n;
        }

        function closeG() {
            document.getElementById('theater').style.display = 'none';
            document.getElementById('f').src = "";
        }

        function full() {
            let el = document.getElementById('f');
            if(el.requestFullscreen) el.requestFullscreen();
            else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        }

        let m = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3");
    </script>
</body>
</html>
