<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GALAXY HUB | UNIT-01</title>
    <style>
        /* NEW CRAZY GAMES INSPIRED THEME */
        body {
            background-color: #0c001c; /* Deep Dark Blue-Black from image */
            color: #ffffff; /* Bright white text */
            font-family: 'Share Tech Mono', monospace; /* Professional Coder Font */
            margin: 0;
            display: flex; /* Required for sidebar layout */
            height: 100vh;
            overflow: hidden; /* Prevent main body from scrolling */
        }

        /* --- LEFT SIDEBAR CATALOG --- */
        .sidebar {
            width: 70px;
            background-color: #12002e; /* Darker than body from image */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 10px;
            border-right: 1px solid #bc13fe; /* Optional glowing border from original */
            overflow-y: auto; /* Scrollable catalog */
        }

        .cat-icon {
            width: 40px;
            height: 40px;
            margin: 10px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            background-size: cover;
            opacity: 0.7;
        }

        .cat-icon:hover { opacity: 1; transform: scale(1.1); }

        /* Icon links - Using small JPGs for performance */
        .all-icon { background-image: url('https://i.ibb.co/6P65m0p/all-games-icon.png'); opacity: 1; }
        .action-icon { background-image: url('https://i.ibb.co/3W9M02b/action-icon.png'); }
        .classic-icon { background-image: url('https://i.ibb.co/W2zH4rP/classic-icon.png'); }

        /* --- MAIN DASHBOARD CONTENT --- */
        .main-dash {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: #12002e;
            padding: 10px;
            text-align: center;
            border-bottom: 2px solid #bc13fe;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { margin: 0; font-size: 1.5rem; text-shadow: 0 0 10px #bc13fe; }

        /* THEATER MODE SCREEN (Initially Hidden) */
        #play-theater {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
        }

        .t-header { width: 100%; padding: 10px; background: #1a0033; display: flex; justify-content: space-between; border-bottom: 2px solid #bc13fe; }
        .t-content { flex: 1; width: 90%; height: 75vh; border: 4px solid #bc13fe; box-shadow: 0 0 30px #bc13fe; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        /* --- CATALOG GRIDS --- */
        .cat-title { padding: 10px 20px; font-weight: bold; border-bottom: 1px solid #444; margin-top: 10px; color: #aaa;}
        .arcade-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; flex: 1; overflow-y: auto; }

        /* CRAZY GAMES STYLE CARD */
        .game-card {
            background: #111; /* Clean dark background */
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            overflow: hidden;
            border: 2px solid transparent; /* No glow on normal */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-card:hover {
            transform: translateY(-8px);
            border-color: #ff00ff; /* Purple Glow on Hover from Crazy Games */
            box-shadow: 0 0 30px #ff00ff;
        }

        /* Thumbnails - Fixes blank screens */
        .card-thumb {
            width: 100%;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #111;
        }

        .card-thumb img {
            width: auto;
            max-width: 80%;
            max-height: 80%;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(255,0,255,0.3);
        }

        .card-info { padding: 10px; text-align: center; font-weight: bold; background: #1a0033; width: 100%; }

        /* MUSIC BAR */
        .music-bar { background: #12002e; border-top: 2px solid #bc13fe; padding: 10px; display: flex; justify-content: center; gap: 15px; }
        button { background: #bc13fe; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-family: 'Share Tech Mono'; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="cat-icon all-icon" onclick="showCatalog('all')" title="All Games"></div>
        <div class="cat-icon action-icon" onclick="showCatalog('action')" title="Action & Driving"></div>
        <div class="cat-icon classic-icon" onclick="showCatalog('classic')" title="Classic & Retro"></div>
    </div>

    <div class="main-dash">
        <header>
            <h1>GALACTIC HUB | UNIT-01</h1>
            <div class="user-info">Connected // Noob_Dev</div>
        </header>

        <div id="play-theater">
            <div class="t-header">
                <button onclick="closeTheater()" style="background: #444;">⬅ BACK</button>
                <h3 id="t-title">LOADING...</h3>
                <button onclick="goTheaterFull()">⛶ FULLSCREEN</button>
            </div>
            <div class="t-content">
                <iframe id="f" allow="autoplay; fullscreen; keyboard"></iframe>
            </div>
        </div>

        <div id="cat-all">
            <div class="cat-title">Top picks for you</div>
            <div class="arcade-grid" id="allGrid"></div>
        </div>
        
        <div id="cat-action" style="display:none;">
            <div class="cat-title">Action & Driving</div>
            <div class="arcade-grid" id="actionGrid"></div>
        </div>
        
        <div id="cat-classic" style="display:none;">
            <div class="cat-title">Classic & Retro</div>
            <div class="arcade-grid" id="classicGrid"></div>
        </div>

        <div class="music-bar">
            <button onclick="m.play()">▶ PLAY MUSIC</button>
            <button onclick="m.pause()">⏸ PAUSE</button>
        </div>
    </div>

    <script>
        // MASTER GAME DATABASE - Fixes broken links and blank icons
        const allGames = [
            // Action & Driving
            { n: "Drift Boss", u: "https://www.bing.com/games/embed/drift-boss/", i: "https://i.ibb.co/3W9M02b/drift-boss-logo.png", c: "action" },
            { n: "Neon Biker", u: "https://v6p9d9t4.ssl.hwcdn.net/html/1453254/index.html", i: "https://i.ibb.co/6P65m0p/neon-biker-logo.png", c: "action" },
            { n: "Cyber Racer", u: "https://games.gamezop.com/g/SkhljT2fdgb", i: "https://i.ibb.co/W2zH4rP/cyber-racer-logo.png", c: "action" },
            { n: "Traffic Rider.io", u: "https://traffic-rider.io/", i: "https://img.gamedistribution.com/d687258380484501869e5d41571253d1-512x512.jpeg", c: "action" },
            { n: "Veck.io", u: "https://veck.io/", i: "https://img.gamedistribution.com/83273640700c439185794c1f6d7247d8-512x512.jpeg", c: "action" },
            { n: "Stickman Swing", u: "https://games.gamezop.com/g/r1_gxS6mX", i: "https://static.gamezop.com/r1_gxS6mX/thumb.png", c: "action" },
            { n: "Tower Twist", u: "https://games.gamezop.com/g/H1Zl1kr7mX", i: "https://static.gamezop.com/H1Zl1kr7mX/thumb.png", c: "action" },
            { n: "Bloxd.io", u: "https://bloxd.io/", i: "https://api.poki.com/poki-poki/v2/image/625/625/1657876116.png", c: "action" },

            // Classic & Retro
            { n: "Hextris", u: "https://hextris.io/", i: "https://i.ibb.co/JqjXG2X/hextris-logo.png", c: "classic" },
            { n: "Pac-Man (HTML5)", u: "https://pacman-html5.vercel.app/", i: "https://raw.githubusercontent.com/fede-navas/Pacman-HTML5/master/app/img/icons/pacman-96x96.png", c: "classic" },
            { n: "Space Waves.io", u: "https://spacewaves.io/", i: "https://img.gamedistribution.com/5f7623971e4d41389886470081d6683a-512x512.jpeg", c: "classic" },
            { n: "Flappy Bird", u: "https://wayou.github.io/FlappyBird/", i: "https://api.poki.com/poki-poki/v2/image/625/625/1657876116.png", c: "classic" }
        ];

        // POPULATE ALL GRIDS - Fixes blank screens
        allGames.forEach(game => {
            const cardHTML = `<div class="game-card" onclick="openTheater('${game.u}', '${game.n}')">
                <div class="card-thumb"><img src="${game.i}"></div>
                <div class="card-info">${game.n}</div>
            </div>`;
            document.getElementById('allGrid').innerHTML += cardHTML;
            if (game.c === 'action') document.getElementById('actionGrid').innerHTML += cardHTML;
            if (game.c === 'classic') document.getElementById('classicGrid').innerHTML += cardHTML;
        });

        // SIDBAR CATALOG LOGIC
        function showCatalog(catId) {
            // Hide all grid sections
            ['all','action','classic'].forEach(id => document.getElementById('cat-'+id).style.display = 'none');
            // Show the selected grid section
            document.getElementById('cat-'+catId).style.display = 'block';
            // Scroll back to top
            document.querySelector('.main-dash').scrollTop = 0;
        }

        // THEATER MODE LOGIC - Crazy Games Style
        function openTheater(u, n) {
            document.getElementById('f').src = u;
            document.getElementById('play-theater').style.display = 'flex';
            document.getElementById('t-title').innerText = n;
        }

        function closeTheater() {
            document.getElementById('play-theater').style.display = 'none';
            document.getElementById('f').src = "";
        }

        function goTheaterFull() {
            let el = document.getElementById('f');
            if(el.requestFullscreen) el.requestFullscreen();
            else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        }

        let m = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3");
    </script>
</body>
</html>
