<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALACTIC ARCADE | CRAZY GAMES EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            background: #020005;
            color: #d880ff;
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* GALAXY BACKGROUND ANIMATION */
        .stars, .twinkling {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000 url(https://www.script-tutorials.com/demos/360/images/stars.png) repeat;
            z-index: -2;
        }
        .twinkling {
            background: transparent url(https://www.script-tutorials.com/demos/360/images/twinkling.png) repeat;
            z-index: -1;
            animation: move-twink 200s linear infinite;
            filter: hue-rotate(280deg);
        }
        @keyframes move-twink { from {background-position:0 0;} to {background-position:-10000px 5000px;} }

        /* HEADER */
        header {
            padding: 20px;
            text-align: center;
            background: rgba(15, 0, 30, 0.9);
            border-bottom: 3px solid #bc13fe;
            box-shadow: 0 0 20px #bc13fe;
        }

        /* CRAZY GAMES GRID */
        #home-page { padding: 40px; }
        .arcade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: rgba(20, 0, 40, 0.9);
            border: 2px solid #bc13fe;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .game-card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px #ff00ff;
            border-color: #ff00ff;
        }

        /* This fixes the blank screens by using logos instead of iframes on the home page */
        .card-thumb {
            width: 100%;
            height: 150px;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info {
            padding: 10px;
            text-align: center;
            font-weight: bold;
            background: rgba(188, 19, 254, 0.2);
        }

        /* PLAY PAGE (Theater Mode) */
        #play-page {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            height: 90vh;
        }

        .game-theater {
            width: 90%;
            max-width: 1200px;
            height: 75vh;
            background: #000;
            border: 4px solid #bc13fe;
            box-shadow: 0 0 40px #bc13fe;
            position: relative;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .btn-group {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }

        button {
            background: #bc13fe;
            color: white;
            border: none;
            padding: 12px 25px;
            font-family: 'Orbitron';
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover { background: #ff00ff; transform: scale(1.05); }

        /* MUSIC BAR */
        .music-bar {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(10, 0, 20, 0.95);
            border-top: 2px solid #bc13fe;
            padding: 15px; display: flex; justify-content: center; gap: 20px;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="stars"></div>

        <header>

        </header>
        <div class="arcade-grid" id="grid"></div>
    </div>

    <div id="play-page">
        <h2 id="active-title" style="margin-bottom:10px;">LOADING...</h2>
        <div class="game-theater">
            <iframe id="gameFrame" src="" allowfullscreen></iframe>
        </div>
        <div class="btn-group">
            <button style="background:#444;" onclick="exitGame()">⬅ BACK TO HUB</button>
            <button onclick="requestFull()">⛶ FULLSCREEN</button>
        </div>
    </div>

    <div class="music-bar">
        <button onclick="playM()">▶ PLAY MUSIC</button>
        <button onclick="pauseM()">⏸ PAUSE</button>
    </div>
