<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALACTIC ARCADE | CRAZY GAMES STYLE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            background: #020005;
            color: #d880ff;
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            overflow: hidden; /* Prevents double scrolling */
        }

        /* PURPLE GALAXY BACKGROUND */
        .stars, .twinkling {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000 url(https://www.script-tutorials.com/demos/360/images/stars.png) repeat;
            z-index: -2;
        }
        .twinkling {
            background: transparent url(https://www.script-tutorials.com/demos/360/images/twinkling.png) repeat;
            z-index: -1;
            animation: move-twink 200s linear infinite;
            filter: hue-rotate(280deg);
        }
        @keyframes move-twink { from {background-position:0 0;} to {background-position:-10000px 5000px;} }

        /* HEADER */
        header {
            padding: 15px;
            text-align: center;
            background: rgba(15, 0, 30, 0.9);
            border-bottom: 3px solid #bc13fe;
            box-shadow: 0 0 20px #bc13fe;
        }

        /* GRID PAGE */
        #home-page {
            height: 100vh;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 100px;
        }
        .arcade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* GAME CARDS (Fixes your blank image issue) */
        .game-card {
            background: rgba(20, 0, 40, 0.9);
            border: 2px solid #bc13fe;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            overflow: hidden;
        }
        .game-card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px #ff00ff;
            border-color: #ff00ff;
        }
        .card-thumb {
            width: 100%;
            height: 140px;
            background: #111;
        }
        .card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-info {
            padding: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 12px;
            background: rgba(188, 19, 254, 0.2);
        }

        /* THEATER MODE (Fixes your "looks like 2nd image" request) */
        #play-page {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #05000a;
            z-index: 2000;
            flex-direction: column;
            align-items: center;
        }
        .game-header {
            width: 100%;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            background: #110022;
            border-bottom: 2px solid #bc13fe;
        }
        .game-theater {
            flex-grow: 1;
            width: 95%;
            max-width: 1100px;
            margin: 20px 0;
            background: #000;
            border: 3px solid #bc13fe;
            box-shadow: 0 0 40px #bc13fe;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* CONTROLS */
        .btn {
            background: #bc13fe;
            color: white;
            border: none;
            padding: 10px 20px;
            font-family: 'Orbitron';
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        .btn:hover { background: #ff00ff; }

        /* MUSIC BAR (Fixed Logic) */
        .music-bar {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(10, 0, 20, 0.95);
            border-top: 2px solid #bc13fe;
            padding: 15px; display: flex; justify-content: center; gap: 20px;
            z-index: 3000;
        }
    </style>
</head>
<body>

    <div class="stars"></div>
    <div class="twinkling"></div>

    <div id="home-page">
        <header>
            <h1>GALACTIC HUB</h1>
            <p>UNIT-01 // SELECT MISSION</p>
        </header>
        <div class="arcade-grid" id="grid"></div>
    </div>

    <div id="play-page">
        <div class="game-header">
            <button class="btn" onclick="exitGame()">⬅ BACK TO HUB</button>
            <h2 id="active-title" style="margin:0; font-size:18px;">LOADING...</h2>
            <button class="btn" onclick="requestFull()">⛶ FULLSCREEN</button>
        </div>
        <div class="game-theater">
            <iframe id="gameFrame" src="" allowfullscreen></iframe>
        </div>
    </div>

    <div class="music-bar">
        <button class="btn" onclick="playMusic()">▶ PLAY MUSIC</button>
        <button class="btn" onclick="pauseMusic()">⏸ PAUSE</button>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        // WORKING GAMES WITH VALID LOGOS
        const gamesList = [
            { n: "Drift Boss", u: "https://www.bing.com/games/embed/drift-boss/", i: "https://img.gamedistribution.com/7106ed807d89408696ec0667e45e758e-512x512.jpeg" },
            { n: "Neon Biker", u: "https://v6p9d9t4.ssl.hwcdn.net/html/1453254/index.html", i: "https://img.gamedistribution.com/d687258380484501869e5d41571253d1-512x512.jpeg" },
            { n: "Cyber Racer", u: "https://games.gamezop.com/g/SkhljT2fdgb", i: "https://static.gamezop.com/SkhljT2fdgb/thumb.png" },
            { n: "Hextris", u: "https://hextris.io/", i: "https://hextris.io/images/og_image.png" },
            { n: "Stickman Swing", u: "https://games.gamezop.com/g/r1_gxS6mX", i: "https://static.gamezop.com/r1_gxS6mX/thumb.png" },
            { n: "Tower Twist", u: "https://games.gamezop.com/g/H1Zl1kr7mX", i: "https://static.gamezop.com/H1Zl1kr7mX/thumb.png" },
            { n: "Knife Flip", u: "https://games.gamezop.com/g/rJ98eS6mX", i: "https://static.gamezop.com/rJ98eS6mX/thumb.png" },
            { n: "City Dunk", u: "https://games.gamezop.com/g/B1M4eH67mX", i: "https://static.gamezop.com/B1M4eH67mX/thumb.png" }
        ];

        const grid = document.getElementById('grid');
        
        // Populate 30 slots
        for (let i = 0; i < 30; i++) {
            let g = gamesList[i % gamesList.length];
            grid.innerHTML += `
                <div class="game-card" onclick="openGame('${g.u}', '${g.n}')">
                    <div class="card-thumb"><img src="${g.i}" onerror="this.src='https://via.placeholder.com/200x140/330066/ffffff?text=Game+Logo'"></div>
                    <div class="card-info">${g.n}</div>
                </div>
            `;
        }

        // NAVIGATION LOGIC
        function openGame(url, title) {
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('play-page').style.display = 'flex';
            document.getElementById('gameFrame').src = url;
            document.getElementById('active-title').innerText = title;
        }

        function exitGame() {
            document.getElementById('home-page').style.display = 'block';
            document.getElementById('play-page').style.display = 'none';
            document.getElementById('gameFrame').src = "";
        }

        // FULLSCREEN LOGIC
        function requestFull() {
            let f = document.getElementById('gameFrame');
            if (f.requestFullscreen) f.requestFullscreen();
            else if (f.webkitRequestFullscreen) f.webkitRequestFullscreen();
            else if (f.msRequestFullscreen) f.msRequestFullscreen();
        }

        // MUSIC LOGIC (Fixed)
        const music = document.getElementById('bgMusic');
        function playMusic() { music.play().catch(() => alert("Click the page first to allow audio!")); }
        function pauseMusic() { music.pause(); }
    </script>
</body>
</html>
