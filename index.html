<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GALACTIC ARCADE | CLICK TO PLAY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            background: #0b001a;
            color: #d880ff;
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* PURPLE GALAXY BACKGROUND */
        .stars, .twinkling {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000 url(https://www.script-tutorials.com/demos/360/images/stars.png) repeat;
            z-index: -2;
        }
        .twinkling {
            background: transparent url(https://www.script-tutorials.com/demos/360/images/twinkling.png) repeat;
            z-index: -1;
            animation: move-twink 200s linear infinite;
            filter: hue-rotate(280deg);
        }
        @keyframes move-twink { from {background-position:0 0;} to {background-position:-10000px 5000px;} }

        header {
            padding: 20px;
            text-align: center;
            background: rgba(15, 0, 30, 0.8);
            border-bottom: 2px solid #bc13fe;
        }

        /* THE GAME GRID (Home Page) */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 40px;
        }

        .card {
            background: rgba(30, 0, 60, 0.8);
            border: 2px solid #bc13fe;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            padding: 10px;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 20px #ff00ff;
        }

        .card img {
            width: 100%;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        /* THE PLAY PAGE (Hidden by default) */
        #game-page {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            height: 90vh;
        }

        .game-wrapper {
            width: 80%;
            height: 70vh;
            border: 4px solid #bc13fe;
            box-shadow: 0 0 30px #bc13fe;
            background: #000;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 20px;
        }

        button {
            background: #bc13fe;
            color: white;
            border: none;
            padding: 15px 30px;
            font-family: 'Orbitron';
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }

        button:hover { background: #ff00ff; }

        .back-btn { background: #444; }

        /* MUSIC BAR */
        .music-bar {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(0,0,0,0.9); padding: 10px;
            display: flex; justify-content: center; gap: 10px;
        }
    </style>
</head>
<body>

    <div class="stars"></div>
    <div class="twinkling"></div>

    <div id="home-page">
        <header>
            <h1>GALACTIC ARCADE</h1>
            <p>SELECT A MISSION TO BEGIN</p>
        </header>
        <div class="grid" id="gameGrid"></div>
    </div>

    <div id="game-page">
        <h2 id="current-title">Game Name</h2>
        <div class="game-wrapper">
            <iframe id="gameFrame" src="" allowfullscreen></iframe>
        </div>
        <div class="controls">
            <button class="back-btn" onclick="goHome()">⬅ BACK TO GRID</button>
            <button onclick="goFull()">⛶ FULLSCREEN</button>
        </div>
    </div>

    <div class="music-bar">
        <button onclick="playM()">▶ PLAY MUSIC</button>
        <button onclick="pauseM()">⏸ PAUSE</button>
    </div>

    <script>
        const gamesList = [
            { n: "Drift Boss", u: "https://www.bing.com/games/embed/drift-boss/", img: "https://via.placeholder.com/200x150/bc13fe/ffffff?text=Drift+Boss" },
            { n: "Neon Biker", u: "https://v6p9d9t4.ssl.hwcdn.net/html/1453254/index.html", img: "https://via.placeholder.com/200x150/bc13fe/ffffff?text=Neon+Biker" },
            { n: "Cyber Racer", u: "https://games.gamezop.com/g/SkhljT2fdgb", img: "https://via.placeholder.com/200x150/bc13fe/ffffff?text=Cyber+Racer" },
            { n: "Hextris", u: "https://hextris.io/", img: "https://via.placeholder.com/200x150/bc13fe/ffffff?text=Hextris" },
            { n: "Stickman Swing", u: "https://games.gamezop.com/g/r1_gxS6mX", img: "https://via.placeholder.com/200x150/bc13fe/ffffff?text=Stickman" },
            { n: "Tower Twist", u: "https://games.gamezop.com/g/H1Zl1kr7mX", img: "https://via.placeholder.com/200x150/bc13fe/ffffff?text=Tower+Twist" }
        ];

        const grid = document.getElementById('gameGrid');
        
        // Populate 30 games
        for (let i = 0; i < 30; i++) {
            let g = gamesList[i % gamesList.length];
            grid.innerHTML += `
                <div class="card" onclick="launchGame('${g.u}', '${g.n}')">
                    <img src="${g.img}" alt="${g.n}">
                    <div>${g.n}</div>
                </div>
            `;
        }

        function launchGame(url, title) {
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('game-page').style.display = 'flex';
            document.getElementById('gameFrame').src = url;
            document.getElementById('current-title').innerText = title;
            window.scrollTo(0,0);
        }

        function goHome() {
            document.getElementById('home-page').style.display = 'block';
            document.getElementById('game-page').style.display = 'none';
            document.getElementById('gameFrame').src = "";
        }

        function goFull() {
            let f = document.getElementById('gameFrame');
            if (f.requestFullscreen) f.requestFullscreen();
            else if (f.webkitRequestFullscreen) f.webkitRequestFullscreen();
            else if (f.msRequestFullscreen) f.msRequestFullscreen();
        }
